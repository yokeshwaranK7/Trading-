  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv>\n                  <span style=\"font-size:11px;color:#7c869b;width:62px;text-align:right\">{{ row.sub }}<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono';font-size:13px;font-weight:600;width:74px;text-align:right;color:{{ row.color }}\">{{ row.pnl }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background:#0f131c;border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:18px 20px\">\n              <span style=\"font-size:14px;font-weight:600;display:block;margin-bottom:12px\">By setup<\u002Fspan>\n              <sc-for list=\"{{ bySetup }}\" as=\"row\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)\">\n                  <span style=\"font-weight:500;width:120px;font-size:13px\">{{ row.name }}<\u002Fspan>\n                  <div style=\"flex:1;height:7px;border-radius:4px;background:#1a2130;overflow:hidden\"><div style=\"{{ row.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n                  <span style=\"font-size:11px;color:#7c869b;width:62px;text-align:right\">{{ row.sub }}<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono';font-size:13px;font-weight:600;width:74px;text-align:right;color:{{ row.color }}\">{{ row.pnl }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- SCREENSHOTS -->\n      <sc-if value=\"{{ isScreens }}\" hint-placeholder-val=\"{{ true }}\">\n        <section data-screen-label=\"Screenshots\" style=\"padding:24px 26px;max-width:1180px;margin:0 auto\">\n          <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px\">\n            <sc-for list=\"{{ filterChips }}\" as=\"chip\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ chip.go }}\" style=\"{{ chip.style }}\">{{ chip.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px\">\n            <sc-for list=\"{{ gallery }}\" as=\"g\" hint-placeholder-count=\"6\">\n              <div onclick=\"{{ g.go }}\" style=\"background:#0f131c;border:1px solid rgba(255,255,255,0.07);border-radius:13px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column\">\n                <div style=\"height:148px;background:#0a0d13;border-bottom:1px solid rgba(255,255,255,0.05);position:relative\">\n                  {{ g.chart }}\n                  <span style=\"position:absolute;top:9px;left:9px;font-family:'IBM Plex Mono';font-size:11px;font-weight:600;background:rgba(11,14,20,0.75);padding:3px 7px;border-radius:6px;color:{{ g.sideColor }}\">{{ g.sideLabel }}<\u002Fspan>\n                  <span style=\"position:absolute;top:9px;right:9px;font-family:'IBM Plex Mono';font-size:12px;font-weight:600;background:rgba(11,14,20,0.75);padding:3px 7px;border-radius:6px;color:{{ g.pnlColor }}\">{{ g.pnl }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"padding:11px 13px;display:flex;flex-direction:column;gap:3px\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                    <span style=\"font-family:'IBM Plex Mono';font-weight:600;font-size:14px\">{{ g.symbol }}<\u002Fspan>\n                    <span style=\"font-size:11px;color:#7c869b\">{{ g.date }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <span style=\"font-size:12px;color:#9aa3b6\">{{ g.setup }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- JOURNAL MODAL -->\n  <sc-if value=\"{{ dayModalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeDay }}\" style=\"position:fixed;inset:0;background:rgba(5,7,11,0.66);backdrop-filter:blur(3px);z-index:40;display:flex;align-items:center;justify-content:center;padding:24px;animation:jf-fade .18s ease\">\n      <div onclick=\"{{ stop }}\" style=\"width:560px;max-width:100%;max-height:88vh;overflow-y:auto;background:#0f131c;border:1px solid rgba(255,255,255,0.10);border-radius:18px;padding:24px;animation:jf-rise .22s ease\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px\">\n          <div style=\"display:flex;flex-direction:column;gap:3px\">\n            <span style=\"font-size:18px;font-weight:600\">{{ dayTitle }}<\u002Fspan>\n            <span style=\"font-size:12px;color:#7c869b\">{{ daySummary }}<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeDay }}\" style=\"width:32px;height:32px;border-radius:9px;background:#141a25;border:1px solid rgba(255,255,255,0.08);color:#9aa3b6;cursor:pointer;font-size:15px\">✕<\u002Fbutton>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ dayHasTrades }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-direction:column;gap:8px;margin-bottom:20px\">\n            <sc-for list=\"{{ dayTrades }}\" as=\"t\" hint-placeholder-count=\"2\">\n              <div onclick=\"{{ t.go }}\" style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:11px;background:#141a25;border:1px solid rgba(255,255,255,0.06);cursor:pointer\">\n                <div style=\"display:flex;align-items:center;gap:11px\">\n                  <span style=\"font-family:'IBM Plex Mono';font-size:11px;font-weight:600;padding:3px 7px;border-radius:6px;background:{{ t.sideBg }};color:{{ t.sideColor }}\">{{ t.sideLabel }}<\u002Fspan>\n                  <div style=\"display:flex;flex-direction:column;gap:1px\">\n                    <span style=\"font-family:'IBM Plex Mono';font-weight:600\">{{ t.symbol }}<\u002Fspan>\n                    <span style=\"font-size:11px;color:#7c869b\">{{ t.setup }} · {{ t.rText }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"font-family:'IBM Plex Mono';font-weight:600;color:{{ t.pnlColor }}\">{{ t.pnl }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ dayNoTrades }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:18px;border:1px dashed rgba(255,255,255,0.10);border-radius:11px;text-align:center;color:#7c869b;font-size:13px;margin-bottom:20px\">No trades logged this day.<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <span style=\"font-size:13px;font-weight:600\">Journal entry<\u002Fspan>\n          <div style=\"display:flex;gap:7px;flex-wrap:wrap\">\n            <sc-for list=\"{{ moodChips }}\" as=\"m\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ m.go }}\" style=\"{{ m.style }}\">{{ m.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <textarea value=\"{{ draftNote }}\" onchange=\"{{ onNoteChange }}\" placeholder=\"What was your plan? How did you execute? What would you do differently?\" style=\"width:100%;min-height:120px;resize:vertical;background:#141a25;border:1px solid rgba(255,255,255,0.08);border-radius:11px;padding:12px 13px;color:#e7ebf3;font-family:'IBM Plex Sans';font-size:13px;line-height:1.55\"><\u002Ftextarea>\n          <div style=\"display:flex;justify-content:flex-end;gap:9px;margin-top:2px\">\n            <button onclick=\"{{ closeDay }}\" style=\"background:#141a25;border:1px solid rgba(255,255,255,0.08);color:#9aa3b6;border-radius:9px;padding:9px 15px;font-family:'IBM Plex Sans';font-weight:500;font-size:13px;cursor:pointer\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ saveNote }}\" style=\"background:#7c83ff;border:none;color:#0b0e14;border-radius:9px;padding:9px 17px;font-family:'IBM Plex Sans';font-weight:600;font-size:13px;cursor:pointer\">Save entry<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- TRADE DETAIL MODAL -->\n  <sc-if value=\"{{ tradeModalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeTrade }}\" style=\"position:fixed;inset:0;background:rgba(5,7,11,0.66);backdrop-filter:blur(3px);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;animation:jf-fade .18s ease\">\n      <div onclick=\"{{ stop }}\" style=\"width:760px;max-width:100%;max-height:90vh;overflow-y:auto;background:#0f131c;border:1px solid rgba(255,255,255,0.10);border-radius:18px;overflow:hidden;animation:jf-rise .22s ease\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid rgba(255,255,255,0.06)\">\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <span style=\"font-family:'IBM Plex Mono';font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;background:{{ td.sideBg }};color:{{ td.sideColor }}\">{{ td.sideLabel }}<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono';font-size:18px;font-weight:600\">{{ td.symbol }}<\u002Fspan>\n            <span style=\"font-size:13px;color:#7c869b\">{{ td.dateFull }}<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeTrade }}\" style=\"width:32px;height:32px;border-radius:9px;background:#141a25;border:1px solid rgba(255,255,255,0.08);color:#9aa3b6;cursor:pointer;font-size:15px\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"height:330px;background:#0a0d13;position:relative;border-bottom:1px solid rgba(255,255,255,0.06)\">{{ td.bigChart }}<\u002Fdiv>\n        <div style=\"padding:20px 22px;display:flex;flex-direction:column;gap:18px\">\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:14px\">\n            <sc-for list=\"{{ td.stats }}\" as=\"st\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;flex-direction:column;gap:3px\">\n                <span style=\"font-size:11px;text-transform:uppercase;letter-spacing:0.5px;color:#7c869b\">{{ st.label }}<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono';font-size:16px;font-weight:600;color:{{ st.color }}\">{{ st.value }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:#9aa3b6\">\n            <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:18px;height:0;border-top:2px dashed #c7cede\"><\u002Fspan>Entry<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:18px;height:0;border-top:2px dashed #21c08b\"><\u002Fspan>Target / Exit<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:18px;height:0;border-top:2px dashed #f3576b\"><\u002Fspan>Stop loss<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:7px\">\n            <span style=\"font-size:13px;font-weight:600\">Trade notes<\u002Fspan>\n            <p style=\"margin:0;font-size:13px;line-height:1.6;color:#b6bdcc\">{{ td.notes }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  \n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    page: 'calendar',\n    year: 2026, monthIdx: 5,\n    selectedDayKey: null,\n    selectedTradeId: null,\n    journals: {},\n    draftNote: '',\n    draftMood: '',\n    filter: 'All',\n    userEmail: '',\n  };\n\n  // ---------- data ----------\n  get trades() {\n    if (!this._trades) this._trades = this.genTrades();\n    return this._trades;\n  }\n\n  rng(seed) {\n    let a = seed >>> 0;\n    return function () {\n      a |= 0; a = (a + 0x6D2B79F5) | 0;\n      let t = Math.imul(a ^ (a >>> 15), 1 | a);\n      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;\n      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;\n    };\n  }\n\n  genTrades() {\n    const r = this.rng(20260601);\n    const symbols = [\n      { s: 'ES', px: 5480, vol: 0.006 }, { s: 'NQ', px: 19850, vol: 0.008 },\n      { s: 'NVDA', px: 122, vol: 0.012 }, { s: 'TSLA', px: 248, vol: 0.014 },\n      { s: 'AAPL', px: 214, vol: 0.008 }, { s: 'SPY', px: 548, vol: 0.005 },\n      { s: 'MSFT', px: 446, vol: 0.007 }, { s: 'AMD', px: 158, vol: 0.013 },\n    ];\n    const setups = ['Breakout', 'VWAP Bounce', 'Pullback', 'Trend Continuation', 'Reversal', 'Opening Range'];\n    const notesPool = [\n      'Clean entry off the level, scaled out into strength. Followed the plan and let the runner work.',\n      'Forced this one — entered before confirmation and got chopped. Should have waited for the retest.',\n      'A+ setup. Risk was well defined, target hit cleanly. Sized appropriately for the conviction.',\n      'Market was choppy and I overtraded. Cut it for a small loss once momentum stalled.',\n      'Held through the pullback as planned. Trail stop did its job and locked in most of the move.',\n      'Decent read but exited too early out of fear. Left a lot on the table — work on patience.',\n    ];\n    const trades = [];\n    let id = 1;\n    const start = new Date(2026, 3, 1); // Apr 1\n    const end = new Date(2026, 5, 27);  // Jun 27\n    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {\n      const dow = d.getDay();\n      if (dow === 0 || dow === 6) continue;\n      const roll = r();\n      let n = roll < 0.30 ? 0 : roll < 0.62 ? 1 : roll < 0.85 ? 2 : 3;\n      for (let k = 0; k < n; k++) {\n        const sym = symbols[Math.floor(r() * symbols.length)];\n        const setup = setups[Math.floor(r() * setups.length)];\n        const side = r() < 0.58 ? 1 : -1; // 1 long, -1 short\n        const win = r() < 0.54;\n        const rMult = win ? +(0.7 + r() * 2.6).toFixed(2) : +(-(0.4 + r() * 0.8)).toFixed(2);\n        const riskUsd = Math.round(120 + r() * 320);\n        const pnl = Math.round(rMult * riskUsd);\n        const entry = +(sym.px * (1 + (r() - 0.5) * 0.01)).toFixed(2);\n        const stopDist = +(entry * sym.vol * (0.8 + r() * 0.8)).toFixed(2);\n        const stop = +(entry - side * stopDist).toFixed(2);\n        const exit = +(entry + side * rMult * stopDist).toFixed(2);\n        const hh = 9 + Math.floor(r() * 6), mm = Math.floor(r() * 60);\n        trades.push({\n          id: id, seed: id * 2654435761 % 2147483647,\n          date: new Date(d.getFullYear(), d.getMonth(), d.getDate()),\n          dateKey: `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`,\n          time: `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`,\n          symbol: sym.s, setup, side, win, rMult, riskUsd, pnl, entry, exit, stop, vol: sym.vol,\n          notes: notesPool[(id + (win ? 2 : 5)) % notesPool.length],\n        });\n        id++;\n      }\n    }\n    trades.sort((a, b) => a.date - b.date || a.time.localeCompare(b.time));\n    return trades;\n  }\n\n  // ---------- helpers ----------\n  money(n) {\n    const s = n < 0 ? '-' : '';\n    return s + '$' + Math.abs(Math.round(n)).toLocaleString('en-US');\n  }\n  signed(n) { return (n >= 0 ? '+' : '') + this.money(n); }\n  pnlColor(n) { return n > 0 ? '#21c08b' : n < 0 ? '#f3576b' : '#9aa3b6'; }\n  fmtDate(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }\n\n  // ---------- chart builders ----------\n  candleChart(trade, opts) {\n    const h = React.createElement;\n    const W = 600, H = (opts && opts.H) || 260, padX = 10, padTop = 14, padBot = 14;\n    const r = this.rng(trade.seed);\n    const n = (opts && opts.n) || 46;\n    const cs = [];\n    let price = trade.entry * (1 - trade.side * trade.vol * 1.4);\n    const target = trade.exit;\n    for (let i = 0; i < n; i++) {\n      const prog = i / (n - 1);\n      const drift = (target - price) * 0.05;\n      const v = trade.entry * trade.vol * 0.9;\n      const o = price;\n      let c = o + drift + (r() - 0.5) * v * 2;\n      const hi = Math.max(o, c) + r() * v;\n      const lo = Math.min(o, c) - r() * v;\n      cs.push({ o, c, hi, lo });\n      price = c;\n    }\n    let mn = Infinity, mx = -Infinity;\n    cs.forEach(k => { mn = Math.min(mn, k.lo); mx = Math.max(mx, k.hi); });\n    [trade.entry, trade.exit, trade.stop].forEach(p => { mn = Math.min(mn, p); mx = Math.max(mx, p); });\n    const pad = (mx - mn) * 0.08; mn -= pad; mx += pad;\n    const yOf = p => padTop + (1 - (p - mn) / (mx - mn)) * (H - padTop - padBot);\n    const xOf = i => padX + (i / (n - 1)) * (W - padX * 2);\n    const cw = ((W - padX * 2) / n) * 0.6;\n    const els = [];\n    cs.forEach((k, i) => {\n      const x = xOf(i);\n      const up = k.c >= k.o;\n      const col = up ? '#1f9c74' : '#c4485a';\n      els.push(h('line', { key: 'w' + i, x1: x, x2: x, y1: yOf(k.hi), y2: yOf(k.lo), stroke: col, strokeWidth: 1 }));\n      const yo = yOf(k.o), yc = yOf(k.c);\n      els.push(h('rect', { key: 'b' + i, x: x - cw / 2, y: Math.min(yo, yc), width: cw, height: Math.max(2, Math.abs(yc - yo)), fill: col, rx: 0.5 }));\n    });\n    const line = (p, color, label) => {\n      const y = yOf(p);\n      return [\n        h('line', { key: 'l' + label, x1: padX, x2: W - padX, y1: y, y2: y, stroke: color, strokeWidth: 1, strokeDasharray: '4 4', opacity: 0.9 }),\n        h('rect', { key: 'lr' + label, x: W - padX - 78, y: y - 9, width: 78, height: 16, rx: 4, fill: color }),\n        h('text', { key: 'lt' + label, x: W - padX - 39, y: y + 2.5, fill: '#0b0e14', fontSize: 10, fontFamily: 'IBM Plex Mono', fontWeight: 600, textAnchor: 'middle', dominantBaseline: 'middle' }, `${label} ${p}`),\n      ];\n    };\n    return h('svg', { viewBox: `0 0 ${W} ${H}`, width: '100%', height: '100%', preserveAspectRatio: 'none', style: { display: 'block' } },\n      els.concat(line(trade.entry, '#c7cede', 'E'), line(trade.exit, '#21c08b', 'X'), line(trade.stop, '#f3576b', 'S')));\n  }\n\n  lineChart(values, opts) {\n    const h = React.createElement;\n    const W = 800, H = (opts && opts.H) || 240, padL = 6, padR = 6, padT = 14, padB = 14;\n    const color = opts.color, fillTop = opts.fillTop, baseAtZero = opts.baseAtZero;\n    let mn = Math.min(...values), mx = Math.max(...values);\n    if (baseAtZero) { mn = Math.min(mn, 0); mx = Math.max(mx, 0); }\n    if (mn === mx) mx = mn + 1;\n    const range = mx - mn;\n    const xOf = i => padL + (i / (values.length - 1)) * (W - padL - padR);\n    const yOf = v => padT + (1 - (v - mn) / range) * (H - padT - padB);\n    let d = '';\n    values.forEach((v, i) => { d += (i ? 'L' : 'M') + xOf(i).toFixed(1) + ' ' + yOf(v).toFixed(1) + ' '; });\n    const zeroY = yOf(0);\n    const area = `M${xOf(0)} ${zeroY} ` + values.map((v, i) => 'L' + xOf(i).toFixed(1) + ' ' + yOf(v).toFixed(1)).join(' ') + ` L${xOf(values.length - 1)} ${zeroY} Z`;\n    const gid = opts.gid;\n    const grid = [];\n    for (let g = 0; g <= 2; g++) {\n      const yy = padT + (g / 2) * (H - padT - padB);\n      grid.push(h('line', { key: 'g' + g, x1: padL, x2: W - padR, y1: yy, y2: yy, stroke: 'rgba(255,255,255,0.05)', strokeWidth: 1 }));\n    }\n    return h('svg', { viewBox: `0 0 ${W} ${H}`, width: '100%', height: '100%', preserveAspectRatio: 'none', style: { display: 'block' } }, [\n      h('defs', { key: 'd' }, h('linearGradient', { id: gid, x1: 0, y1: 0, x2: 0, y2: 1 }, [\n        h('stop', { key: 0, offset: '0%', stopColor: fillTop, stopOpacity: 0.32 }),\n        h('stop', { key: 1, offset: '100%', stopColor: fillTop, stopOpacity: 0 }),\n      ])),\n      ...grid,\n      h('path', { key: 'a', d: area, fill: `url(#${gid})` }),\n      h('path', { key: 'p', d: d, fill: 'none', stroke: color, strokeWidth: 2, strokeLinejoin: 'round', strokeLinecap: 'round' }),\n    ]);\n  }\n\n  // ---------- nav / actions ----------\n  go(page) { this.setState({ page }); }\n  openDay(key) {\n    const j = this.state.journals[key] || {};\n    this.setState({ selectedDayKey: key, draftNote: j.note || '', draftMood: j.mood || '' });\n  }\n  closeDay() { this.setState({ selectedDayKey: null }); }\n  saveNote() {\n    const key = this.state.selectedDayKey;\n    const journals = Object.assign({}, this.state.journals);\n    const entry = { note: this.state.draftNote, mood: this.state.draftMood, updatedAt: Date.now() };\n    journals[key] = entry;\n    this.setState({ journals, selectedDayKey: null });\n    try { if (window.parent && window.parent !== window) window.parent.postMessage({ source: 'ledger', type: 'journalSave', key, entry }, '*'); } catch (e) {}\n  }\n  openTrade(id) { this.setState({ selectedTradeId: id }); }\n  closeTrade() { this.setState({ selectedTradeId: null }); }\n\n  componentDidMount() {\n    this._onHostMsg = (e) => {\n      const m = (e && e.data) || {};\n      if (m.source !== 'host') return;\n      if (m.type === 'user') this.setState({ userEmail: m.email || '' });\n      if (m.type === 'journalData') this.setState({ journals: m.journals || {} });\n    };\n    window.addEventListener('message', this._onHostMsg);\n    try { if (window.parent && window.parent !== window) window.parent.postMessage({ source: 'ledger', type: 'journalRequest' }, '*'); } catch (e) {}\n  }\n  componentWillUnmount() { if (this._onHostMsg) window.removeEventListener('message', this._onHostMsg); }\n\n  monthShift(delta) {\n    let m = this.state.monthIdx + delta, y = this.state.year;\n    if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; }\n    this.setState({ monthIdx: m, year: y });\n  }\n\n  // ---------- render ----------\n  renderVals() {\n    const st = this.state;\n    const trades = this.trades;\n    const self = this;\n    const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];\n\n    // account totals (all trades)\n    const totalPnl = trades.reduce((a, t) => a + t.pnl, 0);\n    const wins = trades.filter(t => t.pnl > 0).length;\n    const winRateAll = trades.length ? Math.round((wins / trades.length) * 100) : 0;\n\n    // nav\n    const icon = (paths) => React.createElement('svg', { width: 17, height: 17, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.7, strokeLinecap: 'round', strokeLinejoin: 'round' }, paths);\n    const R = React.createElement;\n    const icons = {\n      calendar: icon([R('rect', { key: 0, x: 3, y: 4, width: 18, height: 17, rx: 2 }), R('line', { key: 1, x1: 3, y1: 9, x2: 21, y2: 9 }), R('line', { key: 2, x1: 8, y1: 2, x2: 8, y2: 6 }), R('line', { key: 3, x1: 16, y1: 2, x2: 16, y2: 6 })]),\n      performance: icon([R('path', { key: 0, d: 'M4 19V5' }), R('path', { key: 1, d: 'M4 19h16' }), R('path', { key: 2, d: 'M7 15l4-5 3 3 4-6' })]),\n      screens: icon([R('rect', { key: 0, x: 3, y: 4, width: 18, height: 16, rx: 2 }), R('circle', { key: 1, cx: 9, cy: 10, r: 1.6 }), R('path', { key: 2, d: 'M21 16l-5-5L7 20' })]),\n    };\n    const navDef = [{ id: 'calendar', label: 'Calendar' }, { id: 'performance', label: 'Performance' }, { id: 'screens', label: 'Screenshots' }];\n    const navItems = navDef.map(nv => {\n      const active = st.page === nv.id;\n      return {\n        label: nv.label, icon: icons[nv.id], go: () => self.go(nv.id),\n        style: `display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;border:none;cursor:pointer;font-family:'IBM Plex Sans';font-size:13.5px;font-weight:${active ? 600 : 500};text-align:left;background:${active ? 'rgba(124,131,255,0.14)' : 'transparent'};color:${active ? '#aab0ff' : '#9aa3b6'}`,\n      };\n    });\n\n    // header\n    const titles = { calendar: ['Calendar', 'Daily P&L heatmap & journal'], performance: ['Performance', 'Metrics across all trades'], screens: ['Screenshots', 'Chart captures & trade reviews'] };\n    const [pageTitle, pageSubtitle] = titles[st.page];\n\n    // ----- month / calendar -----\n    const y = st.year, m = st.monthIdx;\n    const monthTrades = trades.filter(t => t.date.getFullYear() === y && t.date.getMonth() === m);\n    const monthPnl = monthTrades.reduce((a, t) => a + t.pnl, 0);\n\n    const dayMap = {};\n    monthTrades.forEach(t => {\n      const d = t.date.getDate();\n      if (!dayMap[d]) dayMap[d] = { pnl: 0, count: 0, wins: 0 };\n      dayMap[d].pnl += t.pnl; dayMap[d].count++; if (t.pnl > 0) dayMap[d].wins++;\n    });\n    let maxAbs = 1;\n    Object.values(dayMap).forEach(v => { maxAbs = Math.max(maxAbs, Math.abs(v.pnl)); });\n\n    const firstDow = new Date(y, m, 1).getDay();\n    const daysIn = new Date(y, m + 1, 0).getDate();\n    const todayKey = `${2026}-${5}-${27}`;\n    const calendarCells = [];\n    for (let i = 0; i < firstDow; i++) calendarCells.push({ inMonth: false, style: 'min-height:92px;border-radius:11px;background:transparent', go: () => { } });\n    for (let d = 1; d <= daysIn; d++) {\n      const key = `${y}-${m}-${d}`;\n      const info = dayMap[d];\n      const hasTrades = !!info;\n      const hasNotes = !!st.journals[key];\n      const isToday = key === todayKey;\n      let bg = '#0f131c', border = '1px solid rgba(255,255,255,0.06)';\n      if (hasTrades) {\n        const op = 0.12 + 0.5 * (Math.abs(info.pnl) / maxAbs);\n        bg = info.pnl >= 0 ? `rgba(33,192,139,${op.toFixed(2)})` : `rgba(243,87,107,${op.toFixed(2)})`;\n        border = info.pnl >= 0 ? '1px solid rgba(33,192,139,0.25)' : '1px solid rgba(243,87,107,0.25)';\n      }\n      if (isToday) border = '1px solid #7c83ff';\n      calendarCells.push({\n        inMonth: true, day: d, hasTrades, hasNotes,\n        dayColor: isToday ? '#aab0ff' : '#c7cede',\n        pnlColor: info ? self.pnlColor(info.pnl) : '#9aa3b6',\n        pnlText: info ? self.signed(info.pnl) : '',\n        metaText: info ? `${info.count} trade${info.count > 1 ? 's' : ''} · ${Math.round((info.wins / info.count) * 100)}%` : '',\n        style: `min-height:92px;border-radius:11px;padding:9px 10px;background:${bg};border:${border};cursor:pointer;display:flex;flex-direction:column;transition:transform .1s`,\n        go: () => self.openDay(key),\n      });\n    }\n\n    // ----- performance -----\n    let eq = 0; const equity = [0];\n    trades.forEach(t => { eq += t.pnl; equity.push(eq); });\n    let peak = -Infinity, maxDD = 0; const ddSeries = [];\n    equity.forEach(v => { peak = Math.max(peak, v); const dd = v - peak; ddSeries.push(dd); maxDD = Math.min(maxDD, dd); });\n\n    const winsArr = trades.filter(t => t.pnl > 0), lossArr = trades.filter(t => t.pnl < 0);\n    const grossWin = winsArr.reduce((a, t) => a + t.pnl, 0);\n    const grossLoss = Math.abs(lossArr.reduce((a, t) => a + t.pnl, 0));\n    const avgWin = winsArr.length ? grossWin / winsArr.length : 0;\n    const avgLoss = lossArr.length ? grossLoss / lossArr.length : 0;\n    const profitFactor = grossLoss ? (grossWin / grossLoss) : 0;\n    const avgR = trades.length ? trades.reduce((a, t) => a + t.rMult, 0) / trades.length : 0;\n\n    const statCards = [\n      { label: 'Net P&L', value: self.signed(totalPnl), color: self.pnlColor(totalPnl), sub: `${trades.length} trades` },\n      { label: 'Win rate', value: winRateAll + '%', color: '#e7ebf3', sub: `${winsArr.length}W · ${lossArr.length}L` },\n      { label: 'Profit factor', value: profitFactor.toFixed(2), color: profitFactor >= 1 ? '#21c08b' : '#f3576b', sub: 'gross win / loss' },\n      { label: 'Avg win / loss', value: (avgLoss ? (avgWin / avgLoss).toFixed(2) : '—'), color: '#e7ebf3', sub: `${self.money(avgWin)} / ${self.money(avgLoss)}` },\n      { label: 'Avg R-multiple', value: (avgR >= 0 ? '+' : '') + avgR.toFixed(2) + 'R', color: self.pnlColor(avgR), sub: 'per trade' },\n      { label: 'Max drawdown', value: self.money(maxDD), color: '#f3576b', sub: 'peak to trough' },\n    ];\n\n    const onPerf = st.page === 'performance';\n    const equityChart = onPerf ? self.lineChart(equity, { H: 240, color: '#7c83ff', fillTop: '#7c83ff', gid: 'eqg', baseAtZero: true }) : null;\n    const drawdownChart = onPerf ? self.lineChart(ddSeries, { H: 170, color: '#f3576b', fillTop: '#f3576b', gid: 'ddg', baseAtZero: true }) : null;\n\n    const sorted = [...trades].sort((a, b) => b.pnl - a.pnl);\n    const mkBW = t => ({ symbol: t.symbol, meta: `${t.setup} · ${self.fmtDate(t.date)} · ${(t.rMult >= 0 ? '+' : '') + t.rMult}R`, pnl: self.signed(t.pnl), go: () => self.openTrade(t.id) });\n    const bestTrade = mkBW(sorted[0]);\n    const worstTrade = mkBW(sorted[sorted.length - 1]);\n\n    const groupBy = (keyFn, w) => {\n      const map = {};\n      trades.forEach(t => { const k = keyFn(t); if (!map[k]) map[k] = { name: k, pnl: 0, count: 0, wins: 0 }; map[k].pnl += t.pnl; map[k].count++; if (t.pnl > 0) map[k].wins++; });\n      const arr = Object.values(map).sort((a, b) => b.pnl - a.pnl);\n      const maxP = Math.max(1, ...arr.map(r => Math.abs(r.pnl)));\n      return arr.map(r => ({\n        name: r.name, pnl: self.signed(r.pnl), color: self.pnlColor(r.pnl),\n        sub: `${r.count} · ${Math.round((r.wins / r.count) * 100)}%`,\n        barStyle: `height:100%;width:${Math.round((Math.abs(r.pnl) / maxP) * 100)}%;background:${r.pnl >= 0 ? '#21c08b' : '#f3576b'};border-radius:4px`,\n      }));\n    };\n    const bySymbol = groupBy(t => t.symbol);\n    const bySetup = groupBy(t => t.setup);\n\n    // ----- screenshots -----\n    const setupsAll = ['All', ...Array.from(new Set(trades.map(t => t.setup)))];\n    const filterChips = setupsAll.map(f => {\n      const active = st.filter === f;\n      return { label: f, go: () => self.setState({ filter: f }), style: `padding:7px 13px;border-radius:9px;cursor:pointer;font-family:'IBM Plex Sans';font-size:12.5px;font-weight:${active ? 600 : 500};border:1px solid ${active ? 'rgba(124,131,255,0.4)' : 'rgba(255,255,255,0.08)'};background:${active ? 'rgba(124,131,255,0.14)' : '#0f131c'};color:${active ? '#aab0ff' : '#9aa3b6'}` };\n    });\n    const onScreens = st.page === 'screens';\n    const galleryTrades = !onScreens ? [] : (st.filter === 'All' ? trades : trades.filter(t => t.setup === st.filter)).slice().reverse().slice(0, 18);\n    const gallery = galleryTrades.map(t => ({\n      go: () => self.openTrade(t.id),\n      chart: self.candleChart(t, { H: 148, n: 22 }),\n      symbol: t.symbol, setup: t.setup, date: self.fmtDate(t.date),\n      pnl: self.signed(t.pnl), pnlColor: self.pnlColor(t.pnl),\n      sideLabel: t.side === 1 ? 'LONG' : 'SHORT', sideColor: t.side === 1 ? '#21c08b' : '#f3576b',\n    }));\n\n    // ----- day modal -----\n    const dayKey = st.selectedDayKey;\n    let dayTitle = '', daySummary = '', dayTrades = [], dayHasTrades = false;\n    if (dayKey) {\n      const parts = dayKey.split('-').map(Number);\n      const dd = new Date(parts[0], parts[1], parts[2]);\n      dayTitle = dd.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });\n      const dts = trades.filter(t => t.dateKey === dayKey);\n      dayHasTrades = dts.length > 0;\n      const dPnl = dts.reduce((a, t) => a + t.pnl, 0);\n      const dW = dts.filter(t => t.pnl > 0).length;\n      daySummary = dts.length ? `${self.signed(dPnl)} · ${dts.length} trades · ${Math.round((dW / dts.length) * 100)}% win` : 'No trades · journal only';\n      dayTrades = dts.map(t => ({\n        go: () => self.openTrade(t.id), symbol: t.symbol, setup: t.setup,\n        rText: (t.rMult >= 0 ? '+' : '') + t.rMult + 'R', pnl: self.signed(t.pnl), pnlColor: self.pnlColor(t.pnl),\n        sideLabel: t.side === 1 ? 'LONG' : 'SHORT', sideColor: t.side === 1 ? '#21c08b' : '#f3576b',\n        sideBg: t.side === 1 ? 'rgba(33,192,139,0.14)' : 'rgba(243,87,107,0.14)',\n      }));\n    }\n    const moods = [['😎', 'Disciplined'], ['🎯', 'Focused'], ['😐', 'Neutral'], ['😤', 'Frustrated'], ['🎲', 'Reckless']];\n    const moodChips = moods.map(([emo, name]) => {\n      const active = st.draftMood === name;\n      return { label: emo + ' ' + name, go: () => self.setState({ draftMood: active ? '' : name }), style: `padding:6px 11px;border-radius:8px;cursor:pointer;font-family:'IBM Plex Sans';font-size:12px;font-weight:500;border:1px solid ${active ? 'rgba(124,131,255,0.45)' : 'rgba(255,255,255,0.08)'};background:${active ? 'rgba(124,131,255,0.16)' : '#141a25'};color:${active ? '#aab0ff' : '#9aa3b6'}` };\n    });\n\n    // ----- trade modal -----\n    const trade = trades.find(t => t.id === st.selectedTradeId);\n    let td = null;\n    if (trade) {\n      td = {\n        symbol: trade.symbol, dateFull: trade.date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + ' · ' + trade.time,\n        sideLabel: trade.side === 1 ? 'LONG' : 'SHORT', sideColor: trade.side === 1 ? '#21c08b' : '#f3576b',\n        sideBg: trade.side === 1 ? 'rgba(33,192,139,0.14)' : 'rgba(243,87,107,0.14)',\n        bigChart: self.candleChart(trade, { H: 330 }),\n        notes: trade.notes,\n        stats: [\n          { label: 'P&L', value: self.signed(trade.pnl), color: self.pnlColor(trade.pnl) },\n          { label: 'R-multiple', value: (trade.rMult >= 0 ? '+' : '') + trade.rMult + 'R', color: self.pnlColor(trade.rMult) },\n          { label: 'Entry', value: trade.entry.toLocaleString(), color: '#e7ebf3' },\n          { label: 'Exit', value: trade.exit.toLocaleString(), color: '#e7ebf3' },\n          { label: 'Stop', value: trade.stop.toLocaleString(), color: '#e7ebf3' },\n          { label: 'Setup', value: trade.setup, color: '#e7ebf3' },\n        ],\n      };\n    }\n\n    return {\n      navItems, pageTitle, pageSubtitle,\n      acctBalance: self.money(25000 + totalPnl),\n      acctNetPnl: self.signed(totalPnl), acctPnlColor: self.pnlColor(totalPnl), acctWinRate: winRateAll + '%',\n      isCalendar: st.page === 'calendar', isPerformance: st.page === 'performance', isScreens: st.page === 'screens',\n      headPnl: st.page === 'calendar' ? self.signed(monthPnl) : self.signed(totalPnl),\n      headPnlColor: self.pnlColor(st.page === 'calendar' ? monthPnl : totalPnl),\n      headPnlLabel: st.page === 'calendar' ? 'Month P&L' : 'Total P&L',\n      addTrade: () => self.openDay(todayKey),\n\n      weekdays: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],\n      monthLabel: MONTHS[m] + ' ' + y,\n      prevMonth: () => self.monthShift(-1), nextMonth: () => self.monthShift(1),\n      calendarCells,\n\n      statCards, equityChart, drawdownChart, maxDrawdownText: self.money(maxDD),\n      bestTrade, worstTrade, bySymbol, bySetup,\n\n      filterChips, gallery,\n\n      dayModalOpen: !!dayKey, dayTitle, daySummary, dayTrades, dayHasTrades, dayNoTrades: !!dayKey && !dayHasTrades,\n      draftNote: st.draftNote, moodChips,\n      onNoteChange: (e) => self.setState({ draftNote: e.target.value }),\n      saveNote: () => self.saveNote(), closeDay: () => self.closeDay(),\n\n      tradeModalOpen: !!trade, td, closeTrade: () => self.closeTrade(),\n      hasUser: !!st.userEmail, userEmail: st.userEmail,\n      signOut: () => { try { if (window.parent && window.parent !== window) window.parent.postMessage({ source: 'ledger', type: 'signOut' }, '*'); } catch (e) {} },\n      stop: (e) => e.stopPropagation(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
